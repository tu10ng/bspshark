services:
  bspshark:
    build: .
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - bspshark-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/bspshark.db
      - BACKEND_PORT=8080
      - FRONTEND_PORT=3000
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8080

volumes:
  bspshark-data:
